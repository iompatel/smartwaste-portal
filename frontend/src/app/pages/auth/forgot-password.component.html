<section class="auth-page single">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <span class="eyebrow">Recovery Center</span>
    <h2>Forgot Password</h2>
    <p class="muted">Enter your registered email to request password reset.</p>

    @if (message) {
      <p class="success">{{ message }}</p>
    }

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <label>Email</label>
    <input type="email" formControlName="email" placeholder="name@example.com" />

    <button type="submit" class="primary" [disabled]="loading || cooldownSeconds > 0">
      @if (loading) {
        Sending...
      } @else if (cooldownSeconds > 0) {
        Wait {{ cooldownSeconds }}s
      } @else {
        Send Reset Link
      }
    </button>

    <div class="links">
      <a routerLink="/login">Back to login</a>
    </div>
  </form>
</section>
